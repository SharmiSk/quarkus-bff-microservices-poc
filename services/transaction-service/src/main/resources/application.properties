quarkus.application.name=transaction-service
quarkus.http.port=8082

# JWT verification (shared dev secret)
mp.jwt.verify.publickey.location=jwt/secret.jwk
mp.jwt.verify.publickey.algorithm=HS256
mp.jwt.verify.issuer=qurkus-local

%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:transaction;DB_CLOSE_DELAY=-1
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=sa
%dev.quarkus.hibernate-orm.database.generation=drop-and-create

# Tests run under the %test profile (not %dev).
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:transaction-test;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.hibernate-orm.database.generation=drop-and-create

%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=transaction
%prod.quarkus.datasource.password=transaction
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/transaction
%prod.quarkus.flyway.migrate-at-start=true


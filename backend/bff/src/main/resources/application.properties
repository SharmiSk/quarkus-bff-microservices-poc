quarkus.application.name=bff
quarkus.http.port=8080

# ----- Security (JWT) -----
# Use a symmetric HS256 key so it works without external tooling.
# Verification (Quarkus JWT)
mp.jwt.verify.publickey.location=jwt/secret.jwk
mp.jwt.verify.publickey.algorithm=HS256
mp.jwt.verify.issuer=qurkus-local

# Signing (used by AuthResource via smallrye-jwt-build)
smallrye.jwt.sign.key.location=jwt/secret.jwk
smallrye.jwt.sign.key-format=JWK
smallrye.jwt.sign.algorithm=HS256

# ----- Datasource (dev uses H2, prod uses Postgres) -----
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:bff;DB_CLOSE_DELAY=-1
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=sa
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.flyway.migrate-at-start=false

# Tests run under the %test profile (not %dev).
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:bff-test;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.flyway.migrate-at-start=false

%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=bff
%prod.quarkus.datasource.password=bff
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/bff
%prod.quarkus.flyway.migrate-at-start=true

# ----- Downstream services -----
# Use explicit IPv4 loopback to avoid Windows/Java resolving localhost to IPv6 (::1)
com.qurkus.bff.client.AccountClient/mp-rest/url=http://127.0.0.1:8081
com.qurkus.bff.client.TransactionClient/mp-rest/url=http://127.0.0.1:8082
com.qurkus.bff.client.BudgetClient/mp-rest/url=http://127.0.0.1:8083

# ----- Observability -----
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.binder.http-server.enabled=true

